# Render.com blueprint — deploy a live URL straight from this repo.
# In Render: New ▸ Blueprint ▸ pick the Auto-GM repo ▸ Apply.
services:
  - type: web
    name: hardwood
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
